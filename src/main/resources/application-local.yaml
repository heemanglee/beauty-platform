spring:
  datasource:
    url: jdbc:mysql://localhost:3306/beauty_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}

app:
  product-images:
    bucket: beauty-platform-local
    region: ${AWS_REGION:ap-northeast-2}
    public-base-url: ${PRODUCT_IMAGES_PUBLIC_BASE_URL:your-cloudfront-url}
    upload-url-ttl: ${PRODUCT_IMAGES_UPLOAD_URL_TTL:10m}
