spring:
  application:
    name: beauty-platform
  profiles:
    default: local
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

app:
  auth:
    jwt:
      issuer: ${JWT_ISSUER:http://localhost:8080}
      secret: ${JWT_SECRET}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:60m}
  product-images:
    bucket: ${PRODUCT_IMAGES_BUCKET:beauty-platform}
    region: ${AWS_REGION:ap-northeast-2}
    public-base-url: ${PRODUCT_IMAGES_PUBLIC_BASE_URL:https://cdn.example.com}
    upload-url-ttl: ${PRODUCT_IMAGES_UPLOAD_URL_TTL:10m}
